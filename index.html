<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tier List</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #1a1a1f;
      --border: #2e2e38;
      --text: #f0f0f5;
      --text-muted: #888;
      --label-w: 90px;
      --img-size: 80px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 32px 20px 80px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 6px;
      /* ✏️ Changez le titre ici */
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: .85rem;
      margin-bottom: 36px;
    }

    /* ─── TIER ROWS ─────────────────────────────────────────── */
    #tier-board {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tier-row {
      display: flex;
      min-height: calc(var(--img-size) + 10px);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .tier-label {
      width: var(--label-w);
      min-width: var(--label-w);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      cursor: default;
      user-select: none;
      transition: filter .2s;
    }

    .tier-label:hover { filter: brightness(1.15); }

    /* ✏️ Couleurs par tier — modifiez librement */
    .tier-row[data-tier="S"] .tier-label { background: #ff5757; color: #fff; }
    .tier-row[data-tier="A"] .tier-label { background: #ff9f43; color: #fff; }
    .tier-row[data-tier="B"] .tier-label { background: #ffd32a; color: #1a1a1f; }
    .tier-row[data-tier="C"] .tier-label { background: #0be881; color: #1a1a1f; }
    .tier-row[data-tier="D"] .tier-label { background: #17c0eb; color: #fff; }
    .tier-row[data-tier="F"] .tier-label { background: #7f8fa6; color: #fff; }

    .tier-items {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      background: var(--surface);
      min-height: calc(var(--img-size) + 10px);
    }

    /* Drop highlight */
    .tier-items.drag-over {
      background: rgba(255,255,255,.06);
      outline: 2px dashed rgba(255,255,255,.25);
      outline-offset: -2px;
    }

    /* ─── ITEM CARDS ─────────────────────────────────────────── */
    .item {
      width: var(--img-size);
      height: var(--img-size);
      border-radius: 4px;
      overflow: hidden;
      cursor: grab;
      position: relative;
      flex-shrink: 0;
      transition: transform .15s, box-shadow .15s;
      border: 2px solid transparent;
    }

    .item:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 20px rgba(0,0,0,.5);
      border-color: rgba(255,255,255,.3);
      z-index: 2;
    }

    .item:active { cursor: grabbing; }

    .item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .item-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.65);
      color: #fff;
      font-size: .6rem;
      text-align: center;
      padding: 2px 3px;
      line-height: 1.2;
      backdrop-filter: blur(2px);
    }

    /* ─── POOL (items non classés) ───────────────────────────── */
    #pool-section {
      max-width: 860px;
      margin: 28px auto 0;
    }

    #pool-section h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    #pool {
      min-height: 100px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    #pool.drag-over {
      background: rgba(255,255,255,.04);
      outline: 2px dashed rgba(255,255,255,.2);
      outline-offset: -2px;
    }

    /* ─── BOUTONS ─────────────────────────────────────────────── */
    .actions {
      max-width: 860px;
      margin: 20px auto 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 9px 20px;
      border: none;
      border-radius: 5px;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    button:hover { opacity: .85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    #btn-reset  { background: #2e2e38; color: var(--text); }
    #btn-export { background: #ff5757; color: #fff; }

    /* ─── TOOLTIP ─────────────────────────────────────────────── */
    .tooltip {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #0be881;
      color: #0e0e10;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: .85rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      z-index: 999;
    }
    .tooltip.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- ✏️ Changez le titre et le sous-titre -->
<h1>Les bars de Neuch</h1>
<p class="subtitle">I ♥ N2k </p>

<!-- ─── TIER BOARD ─── -->
<div id="tier-board">
  <!-- ✏️ Ajoutez ou supprimez des lignes, changez data-tier pour le label -->
  <div class="tier-row" data-tier="S"><div class="tier-label">prime</div><div class="tier-items" data-zone="S"></div></div>
  <div class="tier-row" data-tier="A"><div class="tier-label">Au top</div><div class="tier-items" data-zone="A"></div></div>
  <div class="tier-row" data-tier="B"><div class="tier-label">sympa</div><div class="tier-items" data-zone="B"></div></div>
  <div class="tier-row" data-tier="C"><div class="tier-label">ok</div><div class="tier-items" data-zone="C"></div></div>
  <div class="tier-row" data-tier="D"><div class="tier-label">non</div><div class="tier-items" data-zone="D"></div></div>
  <div class="tier-row" data-tier="F"><div class="tier-label">Caca</div><div class="tier-items" data-zone="F"></div></div>
</div>

<!-- ─── POOL ─── -->
<div id="pool-section">
  <h2>Lieux à classer</h2>
  <div id="pool" data-zone="pool"></div>
</div>

<!-- ─── ACTIONS ─── -->
<div class="actions">
  <button id="btn-reset">↺ Recommencer</button>
  <button id="btn-export">Enregistrer</button>
</div>

<div class="tooltip" id="tooltip"></div>

<!-- html2canvas pour l'export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
  // ══════════════════════════════════════════════════════════
  // ✏️  CONFIGUREZ VOS ITEMS ICI
  //     src  : chemin vers l'image (ex: "images/item1.jpg")
  //     name : label affiché sous l'image
  // ══════════════════════════════════════════════════════════
  const ITEMS = [
    { id: 1,  src: "./images/3p.png", name: "3 pièces et demi"  },
    { id: 2,  src: "./images/7.png", name: "Le 7 Club"  },
    { id: 3,  src: "./images/20.png", name: "Bar de l'Univers"  },
    { id: 4,  src: "./images/21.png", name: "Bar au 21"  },
    { id: 5,  src: "./images/23.png", name: "Café du Cerf"  },
    { id: 6,  src: "./images/abc.png", name: "l'ABC"  },
    { id: 7,  src: "./images/antidote.png", name: "l'antidote"  },
    { id: 8,  src: "./images/apotheca.png", name: "l'Apotheca"  },
    { id: 9,  src: "./images/barraquito.png", name: "Le Barraquito"  },
    { id: 10, src: "./images/bassinbleu.png", name: "Le Bassin Bleu" },
    { id: 11, src: "./images/bdl.png", name: "le Bar du Lac" },
    { id: 12, src: "./images/biergarten.png", name: "Le Biergarten" },
    { id: 13, src: "./images/boissonerie.png", name: "La Boissonnerie" },
    { id: 14, src: "./images/cannebiere.png", name: "La Cannebière" },
    { id: 15, src: "./images/case.png", name: "La Case à Chocs" },
    { id: 16, src: "./images/charlot.png", name: "Le Charlot" },
    { id: 17, src: "./images/dtk.png", name: "Le Downtown K" },
    { id: 18, src: "./images/faucon.png", name: "Le Faucon" },
    { id: 19, src: "./images/fusion.png", name: "Le Fusion" },
    { id: 20, src: "./images/interlope.png", name: "L'Interlope"},
    { id: 21, src: "./images/kioskart.png", name: "Le Kioskart" },
    { id: 22, src: "./images/lppbdm.png", name: "Le plus petit bar du monde" },
    { id: 23, src: "./images/marina.png", name: "La Marina" },
    { id: 24, src: "./images/moonshiners.png", name: "Le Moonshiners" },
    { id: 25, src: "./images/prestige.png", name: "Le Prestige" },
    { id: 26, src: "./images/sud.png", name: "Le Sud" },
  ];
  // ══════════════════════════════════════════════════════════

  let dragEl = null;

  function makeItem(data) {
    const div = document.createElement('div');
    div.className = 'item';
    div.draggable = true;
    div.dataset.id = data.id;

    const img = document.createElement('img');
    img.src  = data.src;
    img.alt  = data.name;

    const lbl = document.createElement('div');
    lbl.className = 'item-label';
    lbl.textContent = data.name;

    div.appendChild(img);
    div.appendChild(lbl);

    // Double-clic → renommer
    div.addEventListener('dblclick', () => {
      const n = prompt('Renommer :', lbl.textContent);
      if (n !== null && n.trim()) lbl.textContent = n.trim();
    });

    // Drag events
    div.addEventListener('dragstart', e => {
      dragEl = div;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => div.style.opacity = '.3', 0);
    });
    div.addEventListener('dragend', () => {
      dragEl = null;
      div.style.opacity = '';
    });

    return div;
  }

  // Drop zones
  document.querySelectorAll('[data-zone]').forEach(zone => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (dragEl) zone.appendChild(dragEl);
    });
  });

  // Init pool
  const pool = document.getElementById('pool');
  ITEMS.forEach(item => pool.appendChild(makeItem(item)));

  // Reset
  document.getElementById('btn-reset').addEventListener('click', () => {
    document.querySelectorAll('.item').forEach(el => pool.appendChild(el));
  });

  // Export image
  document.getElementById('btn-export').addEventListener('click', async () => {
    const board = document.getElementById('tier-board');
    const canvas = await html2canvas(board, {
      backgroundColor: '#0e0e10',
      scale: 2,
      useCORS: true
    });
    const a = document.createElement('a');
    a.download = 'tier-list.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    showTip('Image téléchargée !');
  });

  function showTip(msg) {
    const t = document.getElementById('tooltip');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
